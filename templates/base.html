<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}БИТ.Технолог{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/htmx.min.js"></script>
</head>
<body>
    <header>
        <nav>
            <a href="/" class="brand">🔧 БИТ.Технолог</a>
            <a href="/details/new" class="navlink">＋ Деталь</a>
            <a href="/equipment" class="navlink">🔧 Оборудование</a>
            <a href="/materials" class="navlink">📋 Материалы</a>
            <a href="/iot" class="navlink">⚠ ИОТ</a>
            <a href="/benchmarks" class="navlink">📊 Бенчмарки</a>
            <a href="/learning" class="navlink">🎓 Обучение</a>
            {% if demo_mode %}
            <span class="tag demo">⚠ DEMO MODE</span>
            {% else %}
            <span class="tag">LLM: {{ llm_model }}</span>
            {% endif %}
            <span class="spacer"></span>
            <span class="meta">ООО «ПК Техинком-Центр» · Прототип v0.2</span>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <small>БИТ.Технолог · 2026 · Сергей Жуков, Первый БИТ</small>
    </footer>
</body>
</html>
