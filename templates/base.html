<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}БИТ.Технолог{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/htmx.min.js"></script>
</head>
<body>
    <header>
        <nav>
            <a href="/" class="brand">🔧 БИТ.Технолог</a>
            {% if demo_mode %}
            <span class="tag demo">⚠ DEMO MODE (mock LLM)</span>
            {% else %}
            <span class="tag">LLM: {{ llm_model }}</span>
            {% endif %}
            <span class="spacer"></span>
            <span class="meta">ООО «ПК Техинком-Центр» · Прототип v0.1</span>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <small>БИТ.Технолог · 2026 · Сергей Жуков, Первый БИТ</small>
    </footer>
</body>
</html>
