{% extends "base.html" %}
{% block content %}
<div class="breadcrumb"><a href="/">← На главную</a></div>
<h1>{% block page_title %}{% endblock %}</h1>
<p class="lead">{% block page_lead %}{% endblock %}</p>

{% block form %}{% endblock %}

<table class="data-table">
    <thead>
        <tr>{% block head %}{% endblock %}</tr>
    </thead>
    <tbody>
        {% for item in items %}
        <tr>{% block row %}{% endblock %}</tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
